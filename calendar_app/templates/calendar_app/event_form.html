{% extends "calendar_app/base.html" %}
{% load static %}

{% block title %}Edit · {{ event.name }}{% endblock %}

{% block content %}
<h1>Edit Event</h1>
<p><a href="{% if next %}{{ next }}{% else %}{% url 'event_list' %}{% endif %}">&larr; back</a></p>

<div class="modal" style="max-width:900px; margin:0;">
  {% include "calendar_app/_event_edit_form.html" %}
</div>
{% endblock %}

{% block extra_js %}
<script src="{% static 'calendar_app/modal.js' %}"></script>
{% endblock %}
