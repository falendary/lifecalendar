{% extends "calendar_app/base.html" %}
{% load static %}

{% block title %}Edit · {{ event.name }}{% endblock %}

{% block content %}
<div class="event-fullpage">
  <div class="modal drawer" role="dialog" aria-modal="true" aria-label="Edit event">
    <div class="modal-head">
      <h3>Edit Event</h3>
      <a class="modal-close" href="{% if next %}{{ next }}{% else %}{% url 'event_list' %}{% endif %}"
         aria-label="Close">×</a>
    </div>
    {% include "calendar_app/_event_edit_form.html" %}
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{% static 'calendar_app/modal.js' %}"></script>
{% endblock %}
