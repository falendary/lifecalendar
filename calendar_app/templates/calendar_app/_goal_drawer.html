{# Add Goal drawer — shares the Notes-style editor shell. #}
<div class="modal-backdrop drawer-backdrop" id="modal-goal" hidden>
  <div class="modal drawer" role="dialog" aria-modal="true" aria-label="Add goal">
    <div class="modal-head">
      <h3>Add Goal</h3>
      <button type="button" class="modal-close" data-close-modal aria-label="Close">×</button>
    </div>
    <form method="post" action="{% url 'goal_create' %}" class="drawer-form">
      {% csrf_token %}
      <input type="hidden" name="next" value="{{ request.get_full_path }}">

      <div class="event-editor">
        <input type="text" name="title" required autofocus class="event-name" placeholder="Goal title">

        <details class="event-details">
          <summary>Details <span class="muted">— status, years, achieved</span></summary>
          <div class="event-details-body">
            <label>Status</label>
            <select name="status">
              {% for value, label in status_choices %}
                <option value="{{ value }}"{% if value == 'idea' %} selected{% endif %}>{{ label }}</option>
              {% endfor %}
            </select>

            <label>Years <span class="muted">(comma-separated, e.g. 2026, 2027)</span></label>
            <input type="text" name="years" placeholder="2026, 2027">

            <label>Achieved on</label>
            <input type="date" name="achieved_on">

            <label>Achievement note <span class="muted">(added to your journal)</span></label>
            <textarea name="journal_text" rows="3" placeholder="What you did…"></textarea>
          </div>
        </details>

        <textarea name="description" class="event-text" placeholder="Describe the goal…"></textarea>
      </div>

      <div class="modal-foot">
        <button type="button" class="btn-ghost" data-close-modal>Cancel</button>
        <button type="submit" class="action-btn">Add Goal</button>
      </div>
    </form>
  </div>
</div>
