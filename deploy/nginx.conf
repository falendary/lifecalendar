# Life Calendar — Nginx reverse proxy.
# Install to /etc/nginx/sites-available/lifecalendar and symlink into
# sites-enabled. Replace YOUR-SUBDOMAIN.duckdns.org with your DuckDNS hostname.
# Certbot (--nginx) will rewrite/extend this block to add the TLS listener
# and an HTTP->HTTPS redirect automatically.

server {
    listen 80;
    server_name YOUR-SUBDOMAIN.duckdns.org;

    # Don't advertise the Nginx version.
    server_tokens off;

    # Allow large-ish POSTs (journal notes etc.).
    client_max_body_size 5M;

    # Extra response headers (Django already sets HSTS, X-Frame-Options,
    # X-Content-Type-Options). These two it does not.
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Let's Encrypt HTTP-01 challenge files.
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # WhiteNoise serves static files from within Gunicorn, so everything
    # (including /static/) is proxied to the app socket.
    location / {
        proxy_pass http://unix:/run/lifecalendar.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
